services:
  - type: web
    name: jarvis-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGIN
        sync: false
